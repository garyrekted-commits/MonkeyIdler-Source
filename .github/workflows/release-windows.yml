# Build NSIS installer and upload to GitHub Releases (latest.yml + MonkeyIdler-Setup.exe for electron-updater).
# Trigger: push a version tag like v1.17.7 (must match "version" in package.json).

name: Release Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Match tag to package.json (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          REF_NAME="${GITHUB_REF#refs/tags/}"
          TAG_VER="${REF_NAME#v}"
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Git tag: $REF_NAME → version '$TAG_VER' | package.json: '$PKG_VER'"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::The git tag version must equal the \"version\" field in package.json (tag v$TAG_VER vs package $PKG_VER). Amend package.json, commit, re-tag, and push the tag."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Cache Electron + electron-builder
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-eb-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-eb-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build and publish to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: "false"
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}\electron-builder-cache
        run: npm run release
